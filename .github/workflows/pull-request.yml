name: Pull Request

on:
  pull_request:
  push:
    branches:
      - main
      - workstation/*
      - chore/release*

env:
  XCODE_VERSION: "26.2"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read
  checks: write
  id-token: write

jobs:
  pr-branch-check-name:
    name: "Check PR for semantic branch name"
    if: github.event_name == 'pull_request'
    uses: mParticle/mparticle-workflows/.github/workflows/pr-branch-check-name.yml@stable
  pr-title-check:
    name: "Check PR for semantic title"
    if: github.event_name == 'pull_request'
    uses: mParticle/mparticle-workflows/.github/workflows/pr-title-check.yml@stable

  native-unit-tests:
    strategy:
      matrix:
        platform: [iOS]
        scheme: [mParticle-Apple-Media-SDK]
        include:
          - platform: iOS
            device: iPhone 16 Pro
    runs-on: macOS-15
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Run iOS unit tests
        run: xcodebuild -project mParticle-Apple-Media-SDK.xcodeproj -scheme ${{ matrix.scheme }} -destination 'platform=${{ matrix.platform }} Simulator,name=${{ matrix.device }},OS=latest' test

  pr-notify:
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false
    needs:
      - native-unit-tests
    name: Notify GChat
    uses: ROKT/rokt-workflows/.github/workflows/oss_pr_opened_notification.yml@29fed8dd6d3e114dcebf9e0e535ca76bc158210a # main
    secrets:
      gchat_webhook: ${{ secrets.GCHAT_PRS_WEBHOOK }}